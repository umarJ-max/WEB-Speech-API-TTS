<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Umar TTS - Text to Speech</title>
    <link rel="icon" type="image/png" href="Icon.png">
    <link rel="apple-touch-icon" href="Icon.png">
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app">
        <div class="floating-status" id="status">Ready</div>
        
        <main class="main">
            <!-- Title Section -->
            <div class="hero">
                <h1 class="title"><span class="brand">Umar</span> TTS</h1>
                <p class="subtitle">Transform text into speech with AI-powered voices</p>
            </div>

            <!-- Text Input -->
            <div class="input-container">
                <div class="input-wrapper">
                    <textarea 
                        id="textInput" 
                        placeholder="Enter your text here..."
                        maxlength="5000"
                    ></textarea>
                    <div class="char-counter">
                        <span id="charCount">0</span>/5000
                    </div>
                </div>
            </div>

                <!-- Controls Grid -->
                <div class="controls-grid">
                    <div class="control-item">
                        <label>Voice</label>
                        <div class="voice-control">
                            <select id="voiceSelect" class="modern-select">
                                <option value="">Loading voices...</option>
                            </select>
                            <button id="refreshVoices" class="refresh-btn" title="Refresh voices">
                                <i class="fas fa-sync-alt"></i>
                            </button>
                        </div>
                    </div>
                    <div class="control-item">
                        <label>Speed <span id="rateValue">1.0</span>x</label>
                        <input type="range" id="rateRange" class="modern-slider" min="0.1" max="3" step="0.1" value="1">
                    </div>
                    <div class="control-item">
                        <label>Pitch <span id="pitchValue">1.0</span></label>
                        <input type="range" id="pitchRange" class="modern-slider" min="0" max="2" step="0.1" value="1">
                    </div>
                    <div class="control-item">
                        <label>Volume <span id="volumeValue">100</span>%</label>
                        <input type="range" id="volumeRange" class="modern-slider" min="0" max="1" step="0.1" value="1">
                    </div>
                </div>

                <!-- Action Buttons -->
                <div class="actions">
                    <button id="playBtn" class="action-btn primary" disabled>
                        <i class="fas fa-play"></i>
                        Speak
                    </button>
                    <button id="pauseBtn" class="action-btn secondary" disabled>
                        <i class="fas fa-pause"></i>
                        Pause
                    </button>
                    <button id="stopBtn" class="action-btn danger" disabled>
                        <i class="fas fa-stop"></i>
                        Stop
                    </button>
                    <button id="quickTestBtn" class="action-btn outline">
                        <i class="fas fa-zap"></i>
                        Quick Test
                    </button>
                </div>

            <!-- Progress Bar -->
            <div class="progress-container" id="progressContainer" style="display: none;">
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <div class="progress-text" id="progressText">Speaking...</div>
            </div>
        </main>

        <!-- Footer -->
        <footer class="footer">
            <p>&copy; 2025 Created by <strong>Umar</strong></p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
